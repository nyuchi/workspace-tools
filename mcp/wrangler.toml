name = "nyuchi-tools"
main = "src/index.ts"
account_id = "125a2dfbc21f76a25c980609609e8218" # Nyuchi Web Services
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# This Worker serves ALL of tools.nyuchi.com:
#   - /mcp            → MCP JSON-RPC endpoint (run_worker_first bypasses assets)
#   - everything else → the built signature-generator SPA as static assets
#     (single-page-application fallback rewrites unknown paths to index.html)
# Build the SPA first: cd ../signature-generator && npm run build
[assets]
directory = "../signature-generator/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/mcp", "/mcp/*"]

# The `nyuchi.com` zone must exist in Cloudflare and tools.nyuchi.com must be
# a proxied DNS record for the route to take effect.
[[routes]]
pattern = "tools.nyuchi.com/*"
zone_name = "nyuchi.com"

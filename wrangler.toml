name = "nyuchi-tools"
main = "mcp/src/index.ts"
account_id = "125a2dfbc21f76a25c980609609e8218" # Nyuchi Web Services
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Wrangler runs this before every deploy/versions-upload (including Workers
# Builds CI, whose trigger has no build command of its own) so the assets
# directory below always exists in a fresh checkout.
[build]
command = "npm --prefix signature-generator ci && npm --prefix signature-generator run build"

# This Worker serves ALL of tools.nyuchi.com:
#   - /mcp            → MCP JSON-RPC endpoint (run_worker_first bypasses assets)
#   - everything else → the built signature-generator SPA as static assets
#     (single-page-application fallback rewrites unknown paths to index.html)
[assets]
directory = "signature-generator/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/mcp", "/mcp/*", "/.well-known/*", "/register"]

# Workers Custom Domain: Cloudflare creates and manages the DNS record and
# certificate for tools.nyuchi.com itself, and the Worker receives all paths
# on the hostname. The `nyuchi.com` zone must exist in Cloudflare.
[[routes]]
pattern = "tools.nyuchi.com"
custom_domain = true

[vars]
MCP_RESOURCE = "https://tools.nyuchi.com"
# WorkOS Connect (OAuth for the MCP endpoint) activates when AUTHKIT_DOMAIN is
# set — until then /mcp is open. Configure in the WorkOS dashboard first:
# Connect → Configuration → enable client registration (CIMD), and add
# MCP_RESOURCE above as a resource indicator. Then uncomment with your domain:
# AUTHKIT_DOMAIN = "<your-workspace>.authkit.app"

name = "nyuchi-tools"
main = "mcp/src/index.ts"
account_id = "125a2dfbc21f76a25c980609609e8218" # Nyuchi Web Services
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Wrangler runs this before every deploy/versions-upload (including Workers
# Builds CI, whose trigger has no build command of its own) so the assets
# directory below always exists in a fresh checkout.
[build]
command = "npm --prefix signature-generator ci && npm --prefix signature-generator run build"

# This Worker serves ALL of tools.nyuchi.com:
#   - /mcp                     → MCP JSON-RPC endpoint
#   - /.well-known/*           → OAuth + MCP server-card discovery documents
#   - /register                → OAuth dynamic client registration 404 stub
#   - /auth.md                 → human/agent-readable auth architecture doc
#   - /login, /callback, /logout → site-wide login gate (see mcp/src/site-auth.ts)
#   - everything else          → the built signature-generator Astro site as
#     static assets, but ONLY after the login-gate middleware in
#     mcp/src/index.ts lets the request through — every other human-facing
#     page requires a valid `nyuchi_session` cookie.
#
# run_worker_first is now `true` (every request runs the Worker first, for
# every path) instead of an explicit path list: the Worker itself gates
# access and then serves assets via its own catch-all route
# (`app.all("*", (c) => c.env.ASSETS.fetch(c.req.raw))`), since Cloudflare's
# assets-before-Worker shortcut had no way to enforce the session cookie.
[assets]
directory = "signature-generator/dist"
not_found_handling = "404-page"
binding = "ASSETS"
run_worker_first = true

# Workers Custom Domain: Cloudflare creates and manages the DNS record and
# certificate for each hostname, and the Worker receives all paths on both.
# tools.nyuchi.com keeps serving the site (Studio/Signature/Banner, login
# gate) — nothing about it changed. tools.nyuchi.dev is the canonical MCP
# endpoint: tools.nyuchi.com/mcp kept tripping Cloudflare's Layer 7 DDoS
# mitigation for legitimate MCP client traffic (confirmed via the zone's
# firewall event log — a managed_challenge from a ruleset outside WAF's
# reach, not Bot Fight Mode, and not something a WAF custom-rule skip can
# bypass); the nyuchi.dev zone has no such accumulated traffic history.
# Both zones must exist in Cloudflare.
[[routes]]
pattern = "tools.nyuchi.com"
custom_domain = true

[[routes]]
pattern = "tools.nyuchi.dev"
custom_domain = true

[vars]
# Must byte-match the "AuthKit OAuth resource" WorkOS has registered for this
# integration (dashboard: Connect → API Resources) — every MCP integration in
# this WorkOS org follows the same <host>/mcp convention (confirmed via the
# WorkOS API: fundi-ingestion.nyuchi.dev/mcp, mongodb.nyuchi.dev/mcp,
# news.mukoko.com/mcp, mcp.mzizi.dev/mcp all use the /mcp suffix). Tokens
# issued with a resource indicator only carry it as `aud` when it matches a
# registered resource, so this must be exact, not just "the site's origin".
# tools.nyuchi.com/mcp remains reachable (same Worker, same code) but is no
# longer the advertised resource — MCP_RESOURCE below is what discovery
# metadata and audience checks use.
MCP_RESOURCE = "https://tools.nyuchi.dev/mcp"
# WorkOS Connect hosted auth (Connect app client_01KVTX0V2K1VM3PSC0DJ9VZWTV).
# /mcp requires bearer JWTs issued by this authorization server; MCP clients
# discover it via /.well-known/oauth-protected-resource and self-register
# through its dynamic client registration. Unset to run the MCP open.
AUTHKIT_DOMAIN = "identity.nyuchi.com"
# Cloudflare Images account for the MCP upload tools (nyuchi_generate_studio_card's
# returnFormat 'url' / nyuchi_upload_asset). Same account as account_id above. The
# matching CF_IMAGES_TOKEN secret (an API token with Cloudflare Images edit
# permission) is provisioned out-of-band — see the secrets note below.
CF_IMAGES_ACCOUNT_ID = "125a2dfbc21f76a25c980609609e8218"
# Where the nyuchi_report_issue MCP tool files GitHub issues. The matching
# GITHUB_FEEDBACK_TOKEN secret (fine-grained token, Issues: write on this
# repo) is provisioned out-of-band — see the secrets note below.
FEEDBACK_REPO = "nyuchi/workspace-tools"
# Signature Console (docs/signature-console-plan.md): the Google Workspace
# domain whose users the admin mode lists/pushes. The Google OAuth client id
# is public but environment-specific — set it here once created (plan §5):
#   GOOGLE_CLIENT_ID = "<web-app client id>.apps.googleusercontent.com"
# Until it and its secret exist, all /api/google/* and /api/self|admin/*
# routes fail closed with clear "not configured" errors.
GOOGLE_WORKSPACE_DOMAIN = "nyuchi.com"

# Secrets are deliberately NOT set here — they must never be committed to
# git in plaintext. Provision each out-of-band with `wrangler secret put`:
#
#   SESSION_SECRET         — site-wide login gate (mcp/src/site-auth.ts).
#     Fails CLOSED without it: every session-cookie verification treats a
#     missing SESSION_SECRET as "no valid session" (redirect to /login), and
#     /login itself returns 500 rather than starting an OAuth round trip
#     that could never mint a session. Never falls back to running open.
#   CF_IMAGES_TOKEN        — Cloudflare Images API token (Images: edit) for
#     the MCP upload tools. Without it, upload paths return a clear
#     "not configured" tool error; SVG/PNG output still works. The alias
#     CF_IMAGE_TOKEN is also accepted (the production secret was first
#     provisioned under that name); delivery URLs come back from the API
#     as https://imagedelivery.net/<account_hash>/<image_id>/<variant>.
#   GITHUB_FEEDBACK_TOKEN  — fine-grained GitHub token (Issues: write on
#     FEEDBACK_REPO) for the nyuchi_report_issue MCP tool. Without it, the tool
#     returns a clear "not configured" error.
#   SIGNATURE_API_KEY      — shared bearer key for POST /api/signature
#     (Apps Script → Worker). Bearer path fails closed without it; the
#     site-session path is unaffected. Mirror the value into each Apps
#     Script project's Script Properties (same key name).
#   GOOGLE_CLIENT_SECRET   — OAuth web-client secret for /api/google/*
#     (Signature Console self-insert + admin listing).
#   GOOGLE_SA_KEY          — JSON service-account key (client_email +
#     private_key) authorized for domain-wide delegation with
#     gmail.settings.basic; powers /api/admin/push impersonation.
